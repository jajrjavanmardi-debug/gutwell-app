name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        # Deno-typed supabase/functions are excluded — they compile in the
        # edge runtime, not the app bundle.
        run: npx tsc --noEmit 2>&1 | grep -v '^supabase/functions' | tee /tmp/tsc.log; test ! -s /tmp/tsc.log

      - name: Lint
        run: npx expo lint -- --max-warnings 60

      - name: Tests
        run: npx jest --ci
