<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gutwell — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#000000; --surface:#0B0B0B; --surfaceSecondary:#111111; --border:#242424;
    --text:#FFFFFF; --textSecondary:#A7A7A7; --textTertiary:#777777;
    --primary:#1B4332; --secondary:#52B788; --secondaryLight:#74C69D; --accent:#D4A373;
    --ringTrack:#1A1A1A; --ringFill:#52B788;
    --sans:'Inter',-apple-system,system-ui,sans-serif; --serif:'EB Garamond',Georgia,serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#000; font-family:var(--sans); -webkit-font-smoothing:antialiased; padding:20px; display:flex; justify-content:center; }
  .phone {
    width:390px; max-width:100%; background:var(--bg); color:var(--text);
    border-radius:36px; border:1px solid var(--border); overflow:hidden; position:relative;
    background:linear-gradient(180deg,#0a1812 0%,#000 32%);
  }
  .inner { padding:20px 18px 90px; }

  .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .wordmark { display:flex; align-items:center; gap:8px; }
  .wordmark .leaf { width:26px; height:26px; }
  .wordmark .name { font-family:var(--serif); font-weight:600; font-size:26px; letter-spacing:0.3px; }
  .streak {
    display:flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--border);
    border-radius:999px; padding:6px 12px; font-weight:700; font-size:14px;
  }

  .dayRow { display:flex; gap:8px; margin-bottom:22px; }
  .day { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
  .day .wd { font-size:12px; font-weight:500; color:var(--textSecondary); }
  .day .circle { width:36px; height:36px; border-radius:999px; background:var(--surfaceSecondary); display:flex; align-items:center; justify-content:center; font-weight:600; font-size:15px; }
  .day .circle.sel { background:var(--secondary); color:var(--text); }

  .ringWrap { position:relative; width:200px; height:200px; margin:6px auto 24px; }
  .ringWrap svg { transform:rotate(-90deg); }
  .ringCenter { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ringCenter .score { font-family:var(--serif); font-weight:600; font-size:58px; line-height:1; }
  .ringCenter .cap { font-weight:500; font-size:13px; color:var(--textSecondary); margin-top:4px; letter-spacing:0.5px; }

  .stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:22px; }
  .stat { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:14px; display:flex; flex-direction:column; gap:6px; }
  .stat .badge { width:38px; height:38px; border-radius:999px; display:flex; align-items:center; justify-content:center; }
  .stat .val { font-family:var(--serif); font-weight:600; font-size:24px; }
  .stat .lbl { font-size:12px; color:var(--textSecondary); }

  .scanBtn {
    display:flex; align-items:center; justify-content:center; gap:10px; width:100%;
    background:var(--primary); color:#fff; border:none; border-radius:999px; padding:16px;
    font-family:var(--sans); font-weight:700; font-size:16px; letter-spacing:0.3px; margin-bottom:24px;
    box-shadow:0 4px 14px rgba(27,67,50,0.5);
  }

  .sectionTitle { font-family:var(--serif); font-weight:600; font-size:22px; margin-bottom:12px; }
  .logCard { display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:12px; margin-bottom:10px; }
  .logThumb { width:46px; height:46px; border-radius:14px; background:linear-gradient(135deg,#1B4332,#52B788); display:flex; align-items:center; justify-content:center; font-size:22px; }
  .logText .t { font-weight:600; font-size:15px; }
  .logText .s { font-size:12px; color:var(--textSecondary); margin-top:2px; }
  .logScore { margin-left:auto; font-family:var(--serif); font-weight:600; font-size:18px; color:var(--secondaryLight); }

  .tabbar {
    position:absolute; left:0; right:0; bottom:0; height:78px; background:rgba(11,11,11,0.9);
    border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-around; padding:0 24px 14px;
  }
  .tab { font-size:10px; color:var(--textTertiary); display:flex; flex-direction:column; align-items:center; gap:4px; }
  .tab.active { color:var(--secondary); }
  .fab { width:50px; height:50px; border-radius:999px; background:var(--secondary); display:flex; align-items:center; justify-content:center; box-shadow:0 6px 16px rgba(82,183,136,0.45); margin-top:-18px; }
</style>
</head>
<body>
  <div class="phone">
    <div class="inner">
      <div class="topbar">
        <div class="wordmark">
          <svg class="leaf" viewBox="0 0 24 24" fill="none" stroke="#52B788" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6"/></svg>
          <span class="name">Gutwell</span>
        </div>
        <div class="streak">🔥 <span>12</span></div>
      </div>

      <div class="dayRow">
        <div class="day"><span class="wd">M</span><span class="circle">12</span></div>
        <div class="day"><span class="wd">T</span><span class="circle">13</span></div>
        <div class="day"><span class="wd">W</span><span class="circle">14</span></div>
        <div class="day"><span class="wd">T</span><span class="circle">15</span></div>
        <div class="day"><span class="wd">F</span><span class="circle">16</span></div>
        <div class="day"><span class="wd">S</span><span class="circle sel">17</span></div>
        <div class="day"><span class="wd">S</span><span class="circle">18</span></div>
      </div>

      <div class="ringWrap">
        <svg width="200" height="200" viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="91" stroke="var(--ringTrack)" stroke-width="16" fill="none"/>
          <circle cx="100" cy="100" r="91" stroke="var(--ringFill)" stroke-width="16" fill="none"
                  stroke-linecap="round" stroke-dasharray="571.8" stroke-dashoffset="125.8"/>
        </svg>
        <div class="ringCenter">
          <div class="score">78</div>
          <div class="cap">Gut Score</div>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="badge" style="background:rgba(82,183,136,0.13)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#52B788" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/></svg></div>
          <div class="val">28g</div><div class="lbl">Fiber</div>
        </div>
        <div class="stat">
          <div class="badge" style="background:rgba(116,198,157,0.13)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#74C69D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg></div>
          <div class="val">1.4L</div><div class="lbl">Water</div>
        </div>
        <div class="stat">
          <div class="badge" style="background:rgba(212,163,115,0.13)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D4A373" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><circle cx="5" cy="6" r="2"/><circle cx="19" cy="6" r="2"/><circle cx="6" cy="18" r="2"/><circle cx="18" cy="18" r="2"/></svg></div>
          <div class="val">12</div><div class="lbl">Plants</div>
        </div>
      </div>

      <button class="scanBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
        Scan your meal
      </button>

      <div class="sectionTitle">Recently logged</div>
      <div class="logCard">
        <div class="logThumb">🥗</div>
        <div class="logText"><div class="t">Kimchi grain bowl</div><div class="s">12:40 PM · high fiber</div></div>
        <div class="logScore">+9</div>
      </div>
      <div class="logCard">
        <div class="logThumb">🫐</div>
        <div class="logText"><div class="t">Berry kefir smoothie</div><div class="s">8:15 AM · probiotic</div></div>
        <div class="logScore">+7</div>
      </div>
    </div>

    <div class="tabbar">
      <div class="tab active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>Home</div>
      <div class="tab"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V10M10 19V4M16 19v-7M22 19H2"/></svg>Progress</div>
      <div class="fab"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0B2618" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></div>
      <div class="tab"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>Insights</div>
      <div class="tab"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>Profile</div>
    </div>
  </div>
</body>
</html>
